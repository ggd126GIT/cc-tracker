name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 1 * * *'  # daily at 1:00 AM UTC (9:00 AM PHT)
  workflow_dispatch:       # allow manual run from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (select from borrowers)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/borrowers?select=id&limit=1")
          echo "Supabase response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: unexpected status $STATUS"
            exit 1
          fi
          echo "Keep-alive successful."
